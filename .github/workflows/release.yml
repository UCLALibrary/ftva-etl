name: Build and Release Tagged Python Package
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ">=3.13"

      - name: Install Hatch
        uses: pypa/hatch@install

      - name: Read version to ENV
        run: echo "VERSION=$(hatch version)" >> $GITHUB_ENV

      - name: Build wheel
        run: hatch build -t wheel

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          files: dist/*.whl
          body_path: CHANGELOG.md
